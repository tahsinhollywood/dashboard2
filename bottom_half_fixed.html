<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hollywood Partnership KPI - Bottom Half</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Century Gothic', 'Montserrat', 'Sofia Pro', sans-serif;
    background: #ffffff;
    padding: 8px;
  }
  .scale-wrap {
    transform: scale(0.82);
    transform-origin: top left;
    width: 121.95%;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .card {
    border-radius: 11px;
    padding: 18px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 5px;
    min-height: 132px;
  }
  .card .lbl {
    font-size: 9px;
    font-weight: 400;
    color: #ffffff;
    line-height: 1.35;
  }
  .card .val {
    font-size: 30px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
  }
  .card .sub {
    font-size: 10px;
    font-weight: 400;
    color: #ffffff;
  }
</style>
</head>
<body>
<div class="scale-wrap">
<div class="grid">

  <div class="card" style="background:#6FAE7B;">
    <span class="lbl">Trees Trimmed</span>
    <span class="val">673</span>
  </div>

  <div class="card" style="background:#F47E54;">
    <span class="lbl">Ambassador Interactions</span>
    <span class="val">11,615</span>
    <span class="sub">Jan &ndash; Mar 2026</span>
  </div>

  <div class="card" style="background:#c8c8b5;">
    <span class="lbl">Park &amp; Green Space Citywide</span>
    <span class="val">13%</span>
  </div>

  <div class="card" style="background:#ECBDB7;">
    <span class="lbl">Park &amp; Green Space Hollywood</span>
    <span class="val">0.26%</span>
  </div>

  <div class="card" style="background:#D8B5D3;">
    <span class="lbl">Stars Polished</span>
    <span class="val">27,394</span>
    <span class="sub">Jan &ndash; Mar 2026</span>
  </div>

</div>
</div>
</body>
</html>
