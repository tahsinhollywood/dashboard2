<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hollywood Partnership KPI - Bottom Half</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Century Gothic', 'Montserrat', 'Sofia Pro', sans-serif;
    background: #ffffff;
    padding: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }
  .card {
    border-radius: 14px;
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 7px;
    min-height: 170px;
  }
  .card .lbl {
    font-size: 13px;
    font-weight: 400;
    color: #ffffff;
    line-height: 1.35;
    font-family: 'Century Gothic', 'Montserrat', sans-serif;
  }
  .card .val {
    font-size: 40px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.1;
    font-family: 'Century Gothic', 'Montserrat', sans-serif;
  }
  .card .sub {
    font-size: 12px;
    font-weight: 400;
    color: #ffffff;
    font-family: 'Century Gothic', 'Montserrat', sans-serif;
  }
  .card .tag {
    font-size: 11px;
    color: #ffffff;
    background: rgba(0,0,0,0.15);
    padding: 2px 9px;
    border-radius: 999px;
    font-family: 'Century Gothic', 'Montserrat', sans-serif;
  }
  .logo-cell {
    background: #111111;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 170px;
    padding: 16px;
  }
  .logo-cell img {
    max-width: 100%;
    max-height: 140px;
    object-fit: contain;
  }
  .empty { background: transparent; min-height: 170px; }
</style>
</head>
<body>
<div class="grid">

  <div class="card" style="background:#F47E54;">
    <span class="lbl">Ambassador Interactions</span>
    <span class="val">11,615</span>
    <span class="sub">Jan &ndash; Mar 2026</span>
  </div>
  <div class="card" style="background:#c8c8b5;">
    <span class="lbl">Park &amp; Green Space Citywide</span>
    <span class="val">13%</span>
  </div>
  <div class="card" style="background:#ECBDB7;">
    <span class="lbl">Park &amp; Green Space Hollywood</span>
    <span class="val">0.26%</span>
  </div>
  <div class="card" style="background:#D8B5D3;">
    <span class="lbl">Stars Polished</span>
    <span class="val">27,394</span>
    <span class="sub">Jan &ndash; Mar 2026</span>
  </div>

</div>
</body>
</html>
